name: Generate Blog Post

on:
  schedule:
    # 平日 9:00 / 15:00 JST (UTC 0:00 / 6:00) = 週10本
    - cron: '0 0,6 * * 1-5'
  workflow_dispatch:
    inputs:
      category:
        description: 'カテゴリ (tech-tips / it-trends / tech-verification / random)'
        required: false
        default: 'random'
      topic:
        description: '自由テーマ（例: Swiftの最新機能、Docker入門 など）空欄ならカテゴリから自動選択'
        required: false
        default: ''

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install anthropic

      - name: Generate blog post
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          CATEGORY: ${{ github.event.inputs.category || 'random' }}
          TOPIC: ${{ github.event.inputs.topic || '' }}
        run: python scripts/generate_post.py

      - name: Commit and push
        run: |
          git config user.name "OpenWorks Bot"
          git config user.email "bot@ow-japan.com"
          git add _posts/
          # 新しいファイルがあればコミット
          if git diff --cached --quiet; then
            echo "新しい記事なし"
          else
            git commit -m "📝 自動生成記事を追加 [$(date '+%Y-%m-%d')]"
            git push
          fi
