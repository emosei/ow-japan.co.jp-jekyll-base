<header class="site-header" id="site-header">
  <div class="container">
    <nav class="nav-inner">
      <a href="{{ site.baseurl }}/" class="nav-logo">
        <img src="{{ site.baseurl }}/images/logo-header.png" alt="OpenWorks" class="nav-logo-img">
      </a>
      <ul class="nav-links" id="nav-links">
        {% for item in site.data.nav %}
          {% if item.section_id == page.section_id %}
            {% assign active_class = "active" %}
          {% else %}
            {% assign active_class = "" %}
          {% endif %}
          <li>
            <a href="{{ site.baseurl }}/{{ item.path }}" class="{{ active_class }}">{{ item.name }}</a>
          </li>
        {% endfor %}
      </ul>
      <button class="nav-toggle" aria-label="メニュー" aria-expanded="false" id="nav-toggle">
        <svg width="22" height="22" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
          <line x1="2" y1="6" x2="20" y2="6"/>
          <line x1="2" y1="11" x2="20" y2="11"/>
          <line x1="2" y1="16" x2="20" y2="16"/>
        </svg>
      </button>
    </nav>
  </div>
</header>
